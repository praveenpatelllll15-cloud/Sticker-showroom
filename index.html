<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerVerse - 100+ Stickers</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2d3436;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
        }

        /* Header Styles */
        header {
            background: var(--primary);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Filter Section */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Sticker Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* Sticker Card Styles */
        .sticker-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .sticker-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        /* The "Sticker" Look */
        .sticker-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .sticker-card:hover .sticker-image {
            transform: scale(1.05) rotate(2deg);
        }

        .sticker-info {
            margin-top: 15px;
        }

        .sticker-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .sticker-price {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .add-btn {
            background: var(--text);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: var(--primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            background: #dfe6e9;
            margin-top: 50px;
            color: #636e72;
        }

        /* Notification Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <header>
        <h1>StickerVerse 🌌</h1>
        <p>Over 100+ Unique Stickers for your Laptop & Water Bottle</p>
    </header>

    <div class="filters">
        <button class="filter-btn active" onclick="filterStickers('all')">All</button>
        <button class="filter-btn" onclick="filterStickers('animals')">Animals</button>
        <button class="filter-btn" onclick="filterStickers('tech')">Tech</button>
        <button class="filter-btn" onclick="filterStickers('nature')">Nature</button>
        <button class="filter-btn" onclick="filterStickers('funny')">Funny</button>
    </div>

    <div class="container">
        <div class="sticker-grid" id="grid">
            <!-- Stickers will be injected here by JavaScript -->
        </div>
    </div>

    <footer>
        <p>&copy; 2023 StickerVerse. All rights reserved.</p>
    </footer>

    <div id="toast">Added to cart!</div>

    <script>
        // Configuration
        const TOTAL_STICKERS = 120;
        const categories = ['animals', 'tech', 'nature', 'funny'];
        
        // Helper to get random category
        function getRandomCategory() {
            return categories[Math.floor(Math.random() * categories.length)];
        }

        // Helper to generate random price
        function getRandomPrice() {
            return (Math.random() * (3.00 - 1.00) + 1.00).toFixed(2);
        }

        // Generate Sticker Data
        const stickers = [];
        for (let i = 1; i <= TOTAL_STICKERS; i++) {
            const cat = getRandomCategory();
            // Using placehold.co to generate unique placeholder images based on category
            const color = Math.floor(Math.random()*16777215).toString(16);
            const textColor = "ffffff";
            const imgUrl = `https://placehold.co/200x200/${color}/${textColor}?text=Sticker+${i}`;
            
            stickers.push({
                id: i,
                name: `${cat.charAt(0).toUpperCase() + cat.slice(1)} Sticker #${i}`,
                category: cat,
                price: getRandomPrice(),
                image: imgUrl
            });
        }

        const grid = document.getElementById('grid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Function to render stickers
        function renderStickers(filter = 'all') {
            grid.innerHTML = ''; // Clear current grid

            const filteredStickers = filter === 'all' 
                ? stickers 
                : stickers.filter(s => s.category === filter);

            filteredStickers.forEach(sticker => {
                const card = document.createElement('div');
                card.className = 'sticker-card';
                card.innerHTML = `
                    <img src="${sticker.image}" alt="${sticker.name}" class="sticker-image">
                    <div class="sticker-info">
                        <div class="sticker-title">${sticker.name}</div>
                        <div class="sticker-price">$${sticker.price}</div>
                        <button class="add-btn" onclick="addToCart('${sticker.name}')">Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter Logic
        function filterStickers(category) {
            // Update active button state
            filterBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderStickers(category);
        }

        // Add to Cart Simulation
        function addToCart(name) {
            const toast = document.getElementById("toast");
            toast.innerText = `Added ${name} to cart!`;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Initial Render
        renderStickers();

    </script>
</body>
</html>
